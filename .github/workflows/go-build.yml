name: Go Build

env:
  AWS_REGION: eu-central-1
  AWS_ACCOUNT_ID: "528081867341"
  IMAGE: amenotejikara

on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "api/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".golangci.yml"
      - ".github/workflows/go-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "api/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".golangci.yml"
      - ".github/workflows/go-build.yml"

jobs:
  build:
    name: Build and vet
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rotator_test
          POSTGRES_PASSWORD: initial-test-password
          POSTGRES_DB: rotator_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Go tests
        run: go test ./... -v

      # linux/amd64 since this deploys into the kind cluster (shorturl-gitops),
      # not the arm64 targets Susanoo's Lambda functions build for.
      - name: Build manager (linux/amd64)
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o /dev/null ./cmd/manager

  image:
    name: Build and push image
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token: write lets this job exchange a GitHub OIDC token for
      # temporary AWS creds - no long-lived keys in repo secrets. Requires
      # a one-time IAM role setup mirroring ShortUrl's (see that repo's
      # docs/CI_AWS_SETUP.md) - a new ECR repository named "amenotejikara"
      # and a trust-policy role (e.g. amenotejikara-gha-ecr-push) scoped to
      # push only to that repository. Neither exists yet as of this
      # workflow being written - this job will fail on
      # "Configure AWS credentials" until that's set up.
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/amenotejikara-gha-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE }}:latest

  sync-gitops:
    name: Sync CRD and image tag to shorturl-gitops
    needs: image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Keeps two things in shorturl-gitops from drifting out of sync with
      # this repo: k8s/amenotejikara/crd.yaml (config/crd/bases/ is
      # committed by a human after running controller-gen locally - no
      # controller-gen in this CI image, so this just re-publishes what
      # was already committed at this SHA) and deployment.yaml's image
      # tag (same reasoning as ShortUrl's own tag-bump step - without
      # this, :latest+IfNotPresent would silently never roll out new
      # pushes, since ArgoCD only diffs git manifest text and that text
      # never changes on its own).
      - name: Sync CRD and image tag
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_DEPLOY_TOKEN }}
          NEW_TAG: ${{ github.sha }}
        run: |
          git clone https://x-access-token:${GITOPS_TOKEN}@github.com/mykyta-kravchenko98/shorturl-gitops.git gitops-repo
          cd gitops-repo

          sudo curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          {
            echo "# Auto-synced by Amenotejikara's CI (.github/workflows/go-build.yml,"
            echo "# 'sync-gitops' job) from config/crd/bases/ on every push to main."
            echo "# Don't hand-edit this file directly - edit the CRD types in"
            echo "# Amenotejikara's api/v1alpha1, run controller-gen, and push."
            echo "#"
            cat ../config/crd/bases/ops.amenotejikara.dev_credentialrotations.yaml
          } > k8s/amenotejikara/crd.yaml

          yq -i '.spec.template.spec.containers[0].image = "528081867341.dkr.ecr.eu-central-1.amazonaws.com/amenotejikara:" + strenv(NEW_TAG)' \
            k8s/amenotejikara/deployment.yaml

          git add k8s/amenotejikara/crd.yaml k8s/amenotejikara/deployment.yaml
          if git diff --cached --quiet; then
            echo "no change"
            exit 0
          fi
          git commit -m "chore: sync CRD and bump amenotejikara image tag to ${NEW_TAG}"

          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "pushed on attempt ${attempt}"
              exit 0
            fi

            echo "push rejected on attempt ${attempt}, rebasing and retrying"
            git fetch origin main
            git rebase origin/main
            sleep $(( (RANDOM % 5) + 1 ))
          done

          echo "failed to push sync after 5 attempts"
          exit 1
