name: Go Build

on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "api/**"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/go-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "api/**"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/go-build.yml"

jobs:
  build:
    name: Build and vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Go tests
        run: go test ./... -v

      # linux/amd64 since this deploys into the kind cluster (shorturl-gitops),
      # not the arm64 targets Susanoo's Lambda functions build for.
      - name: Build manager (linux/amd64)
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o /dev/null ./cmd/manager
